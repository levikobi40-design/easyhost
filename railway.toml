[build]
builder = "railpack"
buildCommand = "pip install -r requirements.txt && npm install && REACT_APP_API_URL=${REACT_APP_API_URL:-https://energetic-consideration-production-6e7a.up.railway.app} CI=false npm run build"

[deploy]
startCommand = "PYTHONPATH=. gunicorn app:app --workers 1 --timeout 120 --bind 0.0.0.0:$PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3