[phases.setup]
nixPkgs = ["python311", "nodejs_22"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "npm install"
]

[phases.build]
cmds = [
  "REACT_APP_API_URL=${REACT_APP_API_URL:-https://energetic-consideration-production-6e7a.up.railway.app} CI=false npm run build"
]

[start]
cmd = "gunicorn app:app --workers 1 --timeout 120 --bind 0.0.0.0:$PORT"
