services:
  - type: web
    name: easyhost
    runtime: python
    plan: free
    buildCommand: "npm install && CI=false node ./node_modules/react-scripts/bin/react-scripts.js build && pip install -r requirements.txt"
    # Gunicorn always starts — DB init runs eagerly inside app.py at import time.
    # Visit /init-db in the browser to manually force schema creation + seed data.
    startCommand: "gunicorn app:app --workers 1 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: NODE_VERSION
        value: "22"

      # ── Supabase credentials ─────────────────────────────────────────────
      # SUPABASE_URL  → https://YOUR_PROJECT_REF.supabase.co
      #                 (Supabase Dashboard → Project Settings → General → Reference ID)
      # SUPABASE_KEY  → the DATABASE PASSWORD  ← NOT the JWT API key!
      #                 (Supabase Dashboard → Project Settings → Database → Database password)
      # Alternatively, set DATABASE_URL to the full connection URI:
      #   postgresql://postgres:[PASSWORD]@db.[PROJECT_REF].supabase.co:5432/postgres
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # Optional: override with a full Supabase connection URI if preferred
      - key: DATABASE_URL
        sync: false

      # ── AI ───────────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false

      # ── Cloudinary image hosting ─────────────────────────────────────────
      # Get free credentials at https://cloudinary.com/users/register_free
      # Dashboard → API Keys → Copy Cloud Name / API Key / API Secret
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Twilio ───────────────────────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_PHONE_FROM
        sync: false
      - key: OWNER_PHONE
        sync: false
      - key: STAFF_PHONE
        sync: false
      - key: TWILIO_SIMULATE
        value: "1"

      # ── Frontend / build ─────────────────────────────────────────────────
      - key: REACT_APP_API_URL
        value: "https://easyhost.onrender.com"
      - key: API_BASE_URL
        value: "https://easyhost.onrender.com"
      - key: DISABLE_ESLINT_PLUGIN
        value: "true"
      - key: CI
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOW_DEMO_AUTH
        value: "true"
      - key: AUTH_DISABLED
        value: "true"
