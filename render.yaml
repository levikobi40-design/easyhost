services:
  - type: web
    name: easyhost
    runtime: python
    plan: free
    buildCommand: "npm install && CI=false node ./node_modules/react-scripts/bin/react-scripts.js build && pip install -r requirements.txt"
    startCommand: "gunicorn app:app --timeout 120 --workers 2"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: NODE_VERSION
        value: "22"

      # ── Database — set this to your Supabase connection string ──────────
      # Format: postgresql://postgres:[PASSWORD]@db.[PROJECT_REF].supabase.co:5432/postgres
      # Get it from: Supabase Dashboard → Project Settings → Database → Connection string (URI)
      - key: DATABASE_URL
        sync: false

      # ── AI ───────────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false

      # ── Cloudinary image hosting ─────────────────────────────────────────
      # Get free credentials at https://cloudinary.com/users/register_free
      # Dashboard → API Keys → Copy Cloud Name / API Key / API Secret
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Twilio ───────────────────────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_PHONE_FROM
        sync: false
      - key: OWNER_PHONE
        sync: false
      - key: STAFF_PHONE
        sync: false
      - key: TWILIO_SIMULATE
        value: "1"

      # ── Frontend / build ─────────────────────────────────────────────────
      - key: REACT_APP_API_URL
        value: "https://easyhost-backend.onrender.com"
      - key: API_BASE_URL
        value: "https://easyhost-backend.onrender.com"
      - key: DISABLE_ESLINT_PLUGIN
        value: "true"
      - key: CI
        value: "false"
      - key: JWT_SECRET
        generateValue: true
